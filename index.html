                            {assignees.map(a => ( <div key={a.id} className="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5 group"><div className="flex items-center gap-3"><div className="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-[10px] font-bold text-slate-400 group-hover:bg-cyan-600 group-hover:text-white transition-all">{a.name[0]}</div><span className="text-sm font-bold text-slate-300 group-hover:text-white">{a.name}</span></div><button onClick={() => baseRef.collection('assignees').doc(a.id).delete()} className="text-slate-700 hover:text-red-500 transition-all opacity-0 group-hover:opacity-100"><Icons.Trash /></button></div> ))}
                        </div>
                    </div>
                </div>
            );
        }

        function ArchivesModal({ launches, onClose, db }) {
            const baseRef = db.collection('shaktar_data').doc('main');
            return (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in">
                    <div className="bg-[#1c2128] w-full max-w-3xl rounded-[2.5rem] border border-white/10 flex flex-col h-[80vh] overflow-hidden shadow-2xl">
                        <div className="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.02]"><h2 className="font-bold text-white uppercase text-sm tracking-widest flex items-center gap-2"><Icons.Archive /> Arquivados</h2><button onClick={onClose} className="text-slate-500 hover:text-white"><Icons.X /></button></div>
                        <div className="flex-1 overflow-y-auto p-8 space-y-4 bg-black/10 custom-scrollbar">
                            {launches.map(l => ( <div key={l.id} className="p-6 bg-[#161920] rounded-[2rem] border border-white/5 flex justify-between items-center"><div className="flex flex-col flex-1 truncate mr-4"><h4 className="text-white font-bold text-lg truncate">{l.title}</h4><span className="text-[10px] text-slate-600 font-bold uppercase mt-1 tracking-widest">{l.dateStart || 'Sem data'}</span></div><button onClick={() => baseRef.collection('launches').doc(l.id).update({isArchived: false})} className="bg-cyan-600/10 text-cyan-400 border border-cyan-500/20 px-5 py-2.5 rounded-xl text-[10px] font-black uppercase hover:bg-cyan-600 hover:text-white transition-all">Restaurar</button></div> ))}
                        </div>
                    </div>
                </div>
            );
        }

        function BinModal({ launches, tasks, onClose, db }) {
            const [tab, setTab] = useState('L');
            const baseRef = db.collection('shaktar_data').doc('main');
            const items = tab === 'L' ? launches : tasks;
            return (
                <div className="fixed inset-0 bg-black/95 backdrop-blur-md z-50 flex items-center justify-center p-4 animate-in">
                    <div className="bg-[#1c2128] w-full max-w-2xl rounded-[2.5rem] border border-white/10 flex flex-col h-[80vh] overflow-hidden shadow-2xl">
                        <div className="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.02]"><h2 className="font-bold text-white uppercase text-sm tracking-widest flex items-center gap-2">Lixeira</h2><button onClick={onClose} className="text-slate-500 hover:text-white"><Icons.X /></button></div>
                        <div className="flex p-2 gap-2 bg-black/30 border-b border-white/5">
                            <button onClick={() => setTab('L')} className={`flex-1 py-4 rounded-xl text-[10px] font-black uppercase transition-all ${tab === 'L' ? 'bg-cyan-500/10 text-cyan-400' : 'text-slate-600'}`}>Lançamentos ({launches.length})</button>
                            <button onClick={() => setTab('T')} className={`flex-1 py-4 rounded-xl text-[10px] font-black uppercase transition-all ${tab === 'T' ? 'bg-cyan-500/10 text-cyan-400' : 'text-slate-600'}`}>Tarefas ({tasks.length})</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 space-y-4 bg-black/10 custom-scrollbar">
                            {items.map(i => (
                                <div key={i.id} className="p-5 bg-[#0f1115] rounded-3xl flex justify-between items-center border border-white/5 group hover:border-white/10 transition-all">
                                    <div className="flex flex-col flex-1 truncate mr-4"><span className="text-sm truncate font-medium text-slate-300 group-hover:text-white">{i.title || i.text}</span></div>
                                    <div className="flex gap-2 shrink-0">
                                        <button onClick={() => baseRef.collection(tab === 'L' ? 'launches' : 'tasks').doc(i.id).update({isDeleted: false, deletedAt: null})} className="text-cyan-400 text-[9px] font-black border border-cyan-500/30 px-4 py-2 rounded-xl flex items-center gap-2 uppercase tracking-widest"><Icons.RotateCcw /> Restaurar</button>
                                        <button onClick={() => baseRef.collection(tab === 'L' ? 'launches' : 'tasks').doc(i.id).delete()} className="text-red-500 text-[9px] font-black border border-red-500/30 px-4 py-2 rounded-xl flex items-center gap-2 uppercase tracking-widest">Apagar</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
